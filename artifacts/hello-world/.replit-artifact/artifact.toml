kind = "web"
previewPath = "/"
title = "Hello World"
version = "1.0.0"
id = "artifacts/hello-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23537

[services.development]
run = "pnpm --filter @workspace/hello-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hello-world", "run", "build" ]
publicDir = "artifacts/hello-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23537"
BASE_PATH = "/"
